<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Family – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" th:href="@{/dashboard}">Family Hub</a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <h3 th:text="${family.name}">Family name</h3>

    <!-- Members -->
    <div class="card mb-4">
        <div class="card-header">Members</div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="member : ${members}">
                <span th:text="${member.displayName}">Name</span>
                <span class="badge bg-secondary" th:text="${member.role}">ROLE</span>
            </li>
        </ul>
    </div>

    <!-- Invite code (PARENT only) -->
    <div class="card" sec:authorize="hasRole('PARENT')">
        <div class="card-header">Invite code</div>
        <div class="card-body">
            <div th:if="${inviteCode != null}">
                <p>Share this code to invite family members (valid 7 days):</p>
                <h4 class="font-monospace text-primary" th:text="${inviteCode}">CODE</h4>
            </div>
            <div th:if="${inviteCode == null}">
                <p class="text-muted">No active invite code.</p>
            </div>
            <form th:action="@{/family/invite/generate}" method="post" class="mt-2">
                <button type="submit" class="btn btn-outline-primary btn-sm">Generate new code</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
