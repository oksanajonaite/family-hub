<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div class="page-backbar">
            <a th:href="${backUrl}" th:attr="data-back-url=${backUrl}" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span th:text="${backLabel}">Back</span>
            </a>
        </div>

        <section class="page-hero">
            <div class="page-hero-copy">
                <span class="page-kicker"><i class="fa-regular fa-calendar-plus"></i> Event editor</span>
                <h1 class="page-title" th:text="${formData.eventId != null} ? 'Edit event' : 'Create a new event'">Event</h1>
                <p class="page-subtitle">Keep it simple: what it is, when it happens, and who should see it.</p>
            </div>
        </section>

        <div class="form-layout">
            <div class="surface-card form-panel">
                <form th:action="${formData.eventId != null} ? @{/events/{id}/edit(id=${formData.eventId})} : @{/events/create}"
                      th:object="${eventRequest}"
                      method="post">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" th:field="*{title}" class="form-control"
                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                               placeholder="e.g. Dentist appointment">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control event-description-input" rows="1"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                  placeholder="Optional context"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <div class="row g-3 mb-3 event-compact-row">
                        <div class="col-md-4">
                            <label class="form-label">Start date *</label>
                            <input type="text" id="startDate" name="startDate"
                                   th:value="${eventRequest.startDate}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'"
                                   placeholder="Select date" autocomplete="off">
                            <div class="invalid-feedback" th:errors="*{startDate}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">End date</label>
                            <input type="text" id="endDate" name="endDate"
                                   th:value="${eventRequest.endDate}"
                                   class="form-control"
                                   placeholder="Select date (optional)" autocomplete="off">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Start time</label>
                            <input type="text" id="startTime" name="startTime"
                                   th:value="${eventRequest.startTime != null ? #temporals.format(eventRequest.startTime, 'HH:mm') : ''}"
                                   class="form-control"
                                   placeholder="Select time (optional)" autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-4 event-compact-row">
                        <div class="col-md-4">
                            <label class="form-label">Recurrence</label>
                            <select th:field="*{recurrenceType}" id="recurrenceSelect" class="form-select">
                                <option th:each="r : ${formData.recurrenceTypes}" th:value="${r}" th:text="${r}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Repeat until</label>
                            <input type="text" id="recurrenceUntil" name="recurrenceUntil"
                                   th:value="${eventRequest.recurrenceUntil}"
                                   class="form-control"
                                   placeholder="Select date (optional)" autocomplete="off">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">End time</label>
                            <input type="text" id="endTime" name="endTime"
                                   th:value="${eventRequest.endTime != null ? #temporals.format(eventRequest.endTime, 'HH:mm') : ''}"
                                   class="form-control"
                                   placeholder="Select time (optional)" autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Category</label>
                        <div class="event-type-grid">
                            <div th:each="t : ${formData.eventTypes}" class="event-type-option">
                                <input type="radio"
                                       th:id="${'type-' + t.name()}"
                                       name="type"
                                       th:value="${t.name()}"
                                       th:checked="${eventRequest.type == t}"
                                       class="event-type-radio">
                                <label th:for="${'type-' + t.name()}" class="event-type-label">
                                    <i th:class="${t.icon}"></i>
                                    <span th:text="${t.label}"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Participants</label>
                        <div class="selection-panel">
                            <div class="selection-list-plain" th:if="${not #lists.isEmpty(formData.registeredUsers) or not #lists.isEmpty(formData.familyMembers) or not #lists.isEmpty(formData.pets)}">
                                <div th:each="user : ${formData.registeredUsers}" class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:id="${'user-' + user.id}"
                                           th:name="participantIds"
                                           th:value="${'USER_' + user.id}"
                                           th:checked="${formData.participantIds != null and #lists.contains(formData.participantIds, 'USER_' + user.id)}">
                                    <label class="form-check-label small" th:for="${'user-' + user.id}" th:text="${user.displayName}"></label>
                                </div>
                                <div th:each="fm : ${formData.familyMembers}" class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:id="${'member-' + fm.id}"
                                           th:name="participantIds"
                                           th:value="${'MEMBER_' + fm.id}"
                                           th:checked="${formData.participantIds != null and #lists.contains(formData.participantIds, 'MEMBER_' + fm.id)}">
                                    <label class="form-check-label small" th:for="${'member-' + fm.id}" th:text="${fm.name}"></label>
                                </div>
                                <div th:each="pet : ${formData.pets}" class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:id="${'pet-' + pet.id}"
                                           th:name="participantIds"
                                           th:value="${'PET_' + pet.id}"
                                           th:checked="${formData.participantIds != null and #lists.contains(formData.participantIds, 'PET_' + pet.id)}">
                                    <label class="form-check-label small" th:for="${'pet-' + pet.id}" th:text="${pet.name}"></label>
                                </div>
                            </div>
                            <p th:if="${#lists.isEmpty(formData.registeredUsers) and #lists.isEmpty(formData.familyMembers) and #lists.isEmpty(formData.pets)}"
                               class="text-earth-muted small mb-0">No family members or pets available yet.</p>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" th:field="*{privateEvent}" class="form-check-input" id="privateEvent">
                        <label class="form-check-label small" for="privateEvent">Private event (only you can see it)</label>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-terracotta">Save event</button>
                        <a th:href="${backUrl}" class="btn btn-outline-earth">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
    const dateConfig = { dateFormat: "Y-m-d", allowInput: true, disableMobile: true, locale: { firstDayOfWeek: 1 } };
    const timeConfig = { enableTime: true, noCalendar: true, time_24hr: true, dateFormat: "H:i", allowInput: true, disableMobile: true };
    flatpickr("#startDate", dateConfig);
    flatpickr("#startTime", timeConfig);
    flatpickr("#endDate", dateConfig);
    flatpickr("#endTime", timeConfig);
    flatpickr("#recurrenceUntil", dateConfig);
</script>
</body>
</html>
