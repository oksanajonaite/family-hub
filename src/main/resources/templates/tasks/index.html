<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tasks – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 780px;">

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 text-clay fw-semibold">
            <i class="fa-solid fa-list-check me-1"></i> Tasks
        </h4>
        <a th:href="@{/tasks/create}" class="btn btn-terracotta btn-sm rounded-pill px-3">
            <i class="fa-solid fa-plus me-1"></i> New Task
        </a>
    </div>

    <!-- Status filter buttons -->
    <div class="mb-3 d-flex gap-2 flex-wrap">
        <a th:href="@{/tasks}"
           class="btn btn-sm rounded-pill"
           th:classappend="${selectedStatus == null} ? 'btn-terracotta' : 'btn-outline-earth'">All</a>
        <a th:each="s : ${statuses}"
           th:href="@{/tasks(status=${s})}"
           th:text="${s}"
           class="btn btn-sm rounded-pill"
           th:classappend="${selectedStatus == s} ? 'btn-terracotta' : 'btn-outline-earth'">
        </a>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" class="text-earth-muted text-center mt-5 small">
        No tasks found.
    </div>

    <div class="d-flex flex-column gap-2">
        <div th:each="task : ${tasks}" class="widget-card">
            <div class="widget-body">
                <div class="d-flex justify-content-between align-items-start gap-3">

                    <div class="flex-grow-1">
                        <!-- Title with strikethrough when DONE -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span th:text="${task.title}" class="fw-500"
                                  th:classappend="${task.status.name() == 'DONE'} ? 'text-decoration-line-through text-earth-muted'">
                            </span>
                            <!-- Priority badge -->
                            <span class="badge rounded-pill"
                                  th:text="${task.priority}"
                                  th:style="${task.priority.name() == 'HIGH'} ? 'background:rgba(184,105,58,0.15);color:var(--color-terracotta);font-size:0.65rem;' :
                                            (${task.priority.name() == 'MEDIUM'} ? 'background:rgba(107,124,74,0.12);color:var(--color-olive);font-size:0.65rem;' :
                                            'background:rgba(90,62,46,0.10);color:var(--text-muted);font-size:0.65rem;')">
                            </span>
                        </div>

                        <!-- Assigned users and members -->
                        <div th:if="${not #lists.isEmpty(task.assignedUsers) or not #lists.isEmpty(task.assignedMembers)}"
                             class="text-earth-muted small mb-1">
                            <i class="fa-solid fa-user-group me-1"></i>
                            <span th:each="u, i : ${task.assignedUsers}"
                                  th:text="${u.displayName + (i.last and #lists.isEmpty(task.assignedMembers) ? '' : ', ')}"></span>
                            <span th:each="m, i : ${task.assignedMembers}"
                                  th:text="${m.name + (i.last ? '' : ', ')}"></span>
                        </div>

                        <!-- Due date -->
                        <div th:if="${task.dueDate != null}" class="text-earth-muted small">
                            <i class="fa-regular fa-calendar me-1"></i>
                            Due: <span th:text="${#temporals.format(task.dueDate, 'MMM d')}"></span>
                        </div>
                    </div>

                    <div class="d-flex gap-2 align-items-center flex-shrink-0">
                        <!-- Status change dropdown -->
                        <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post">
                            <select name="status" class="form-select form-select-sm status-select"
                                    style="font-size:0.78rem;min-width:115px;border-radius:var(--radius-sm);font-weight:500;"
                                    onchange="colorStatus(this); this.form.submit()">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${task.status == s}">
                                </option>
                            </select>
                        </form>

                        <!-- Edit and Delete — PARENT only -->
                        <div sec:authorize="hasRole('PARENT')" class="d-flex gap-1">
                            <a th:href="@{/tasks/{id}/edit(id=${task.id})}"
                               class="btn btn-outline-earth btn-sm" style="font-size:0.75rem;">Edit</a>
                            <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
                                  data-confirm="Delete this task?">
                                <button type="submit" class="btn btn-outline-danger btn-sm" style="font-size:0.75rem;">Delete</button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-modal :: confirm-modal}"></div>
<script>
    // Color the status dropdown based on its current value
    function colorStatus(sel) {
        const styles = {
            'TODO':        { bg: 'rgba(107,124,74,0.12)',  color: '#6B7C4A' },
            'IN_PROGRESS': { bg: 'rgba(184,105,58,0.15)', color: '#B8693A' },
            'DONE':        { bg: 'rgba(90,62,46,0.08)',   color: '#8B6355' }
        };
        const s = styles[sel.value] || {};
        sel.style.backgroundColor = s.bg || '';
        sel.style.color = s.color || '';
        sel.style.borderColor = s.color || '';
    }
    document.querySelectorAll('.status-select').forEach(colorStatus);
</script>
</body>
</html>
