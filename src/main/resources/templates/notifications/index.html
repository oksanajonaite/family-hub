<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" th:href="@{/dashboard}">Family Hub</a>
    <div class="d-flex align-items-center gap-3">
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">← Dashboard</a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 720px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            Notifications
            <!-- Badge rodomas tik jei yra neperskaitytų pranešimų (th:if) -->
            <span th:if="${unreadCount > 0}"
                  class="badge bg-danger ms-2"
                  th:text="${unreadCount}">
            </span>
        </h2>

        <!-- "Mark all as read" mygtukas rodomas tik kai yra neperskaitytų -->
        <form th:if="${unreadCount > 0}"
              th:action="@{/notifications/read-all}"
              method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Mark all as read
            </button>
        </form>
    </div>

    <!-- Flash žinutės (sėkmė / klaida) — perduodamos per RedirectAttributes -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Pranešimų sąrašas -->
    <!-- th:each — Thymeleaf ciklas, analogiškas Java for-each -->
    <div th:each="notification : ${notifications}"
         th:classappend="${!notification.read()} ? 'border-start border-primary border-3' : ''"
         class="card mb-2">
        <div class="card-body py-2 px-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <!-- Pranešimo tipas — rodomas kaip badge -->
                    <span class="badge bg-secondary mb-1" th:text="${notification.type()}"></span>

                    <!-- Neperskaityto pranešimo tekstas paryškinamas -->
                    <p th:classappend="${!notification.read()} ? 'fw-semibold' : 'text-muted'"
                       class="mb-1"
                       th:text="${notification.message()}">
                    </p>

                    <!-- Laikas — LocalDateTime formatuojamas Thymeleaf #temporals pagalba -->
                    <small class="text-muted"
                           th:text="${#temporals.format(notification.createdAt(), 'yyyy-MM-dd HH:mm')}">
                    </small>
                </div>

                <!-- "Mark as read" mygtukas rodomas tik neperskaitytiems pranešimams -->
                <form th:if="${!notification.read()}"
                      th:action="@{/notifications/{id}/read(id=${notification.id()})}"
                      method="post"
                      class="ms-3 flex-shrink-0">
                    <button type="submit" class="btn btn-outline-primary btn-sm">
                        Mark as read
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Tuščias sąrašas — rodomas kai pranešimų nėra -->
    <div th:if="${#lists.isEmpty(notifications)}" class="text-muted text-center mt-5">
        <p>No notifications yet.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
