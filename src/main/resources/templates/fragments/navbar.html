<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  th:fragment="appShell" - authenticated topbar layout.
  Include in authenticated templates:
      <div th:replace="~{fragments/navbar :: appShell}"></div>

  Content must be wrapped in:
      <div class="app-content" id="appContent">
          ...your page content...
      </div>
-->
<div th:fragment="appShell"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <header class="app-topbar" id="appTopbar">
        <div class="topbar-left">
            <a class="topbar-brand" th:href="@{/dashboard}">
                <img class="topbar-brand-logo"
                     th:src="@{/img/logo.svg}"
                     alt="Family Hub logo">
                <span class="topbar-brand-name">Family Hub</span>
            </a>
            <nav class="topbar-nav" sec:authorize="!hasRole('ADMIN')">
                <a class="topbar-nav-link"
                   th:href="@{/dashboard}"
                   th:classappend="${currentUri == '/dashboard'} ? ' active'">
                    <i class="fa-regular fa-calendar" aria-hidden="true"></i>
                    <span>Dashboard</span>
                </a>
                <a class="topbar-nav-link"
                   th:href="@{/family}"
                   th:classappend="${currentUri != null && currentUri.startsWith('/family')} ? ' active'">
                    <i class="fa-solid fa-people-roof" aria-hidden="true"></i>
                    <span>Family</span>
                </a>
            </nav>
            <nav class="topbar-nav" sec:authorize="hasRole('ADMIN')">
                <a class="topbar-nav-link"
                   th:href="@{/admin}"
                   th:classappend="${currentUri != null && currentUri.startsWith('/admin')} ? ' active'">
                    <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
                    <span>Admin Panel</span>
                </a>
            </nav>
        </div>

        <div class="topbar-right">
            <div class="topbar-greeting" sec:authorize="!hasRole('ADMIN')">
                <span class="topbar-greeting-label">Welcome,</span>
                <span class="topbar-greeting-name" sec:authentication="principal.displayName"></span>
            </div>
            <a class="topbar-bell" th:href="@{/notifications}"
               sec:authorize="!hasRole('ADMIN')"
               title="Notifications">
                <i class="fa-regular fa-bell"></i>
                <span class="topbar-bell-badge"
                      th:if="${unreadCount != null and unreadCount > 0}"></span>
            </a>
            <div class="dropdown topbar-quick-add-wrap" sec:authorize="!hasRole('ADMIN')">
                <button class="btn-quick-add dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add</span>
                </button>
                <ul class="dropdown-menu quick-add-dropdown dropdown-menu-end">
                    <!--
                        sec:authorize="hasRole('PARENT')" - Thymeleaf Security dialect.
                        The entire <li> is removed from the rendered HTML for KID users.
                        This is a UI convenience only - the real access control is in the controller.
                    -->
                    <li sec:authorize="hasRole('PARENT')">
                        <a class="dropdown-item" th:href="@{/tasks/create}">
                            <i class="fa-solid fa-list-check"></i>
                            <span class="dropdown-item-copy">
                                <span class="dropdown-item-label">Add task</span>
                                <span class="dropdown-item-meta">Plan something to do</span>
                            </span>
                        </a>
                    </li>
                    <li sec:authorize="hasRole('PARENT')">
                        <a class="dropdown-item" th:href="@{/events/create}">
                            <i class="fa-regular fa-calendar-plus"></i>
                            <span class="dropdown-item-copy">
                                <span class="dropdown-item-label">Add event</span>
                            <span class="dropdown-item-meta">Schedule family time</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="dropdown">
                <button class="topbar-avatar-btn dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <!-- Show uploaded photo when available; fall back to initials circle.
                         Uses /api/photo/user/{id} - PhotoController generates a fresh pre-signed S3 URL.
                         The bucket is private, so no direct S3 URL is embedded in the HTML. -->
                    <img th:if="${#authentication.principal.avatarKey != null}"
                         class="entity-avatar entity-avatar-img topbar-user-photo"
                         th:src="@{/api/photo/user/{id}(id=${#authentication.principal.id})}"
                         alt="Profile photo">
                    <div th:unless="${#authentication.principal.avatarKey != null}"
                         class="topbar-avatar"
                         th:text="${#strings.substring(#authentication.principal.displayName, 0, 1)}">U</div>
                    <span class="topbar-username"
                          sec:authentication="principal.displayName"></span>
                </button>
                <ul class="dropdown-menu topbar-avatar-dropdown dropdown-menu-end">
                    <li>
                        <span class="dropdown-item-text small text-earth-muted px-3 py-1"
                              sec:authentication="principal.displayName"></span>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="mb-0">
                            <button type="submit"
                                    class="dropdown-item text-danger">
                                <i class="fa-solid fa-right-from-bracket"></i> Log out
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <nav class="mobile-bottom-nav" sec:authorize="!hasRole('ADMIN')">
        <a class="mobile-bottom-nav-link"
           th:href="@{/dashboard}"
           th:classappend="${currentUri == '/dashboard'} ? ' active'">
            <i class="fa-regular fa-calendar"></i>
            <span>Home</span>
        </a>
        <div class="dropdown mobile-bottom-nav-add-wrap">
            <button class="mobile-bottom-nav-add dropdown-toggle"
                    aria-label="Quick add"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
                <span class="mobile-bottom-nav-add-symbol">+</span>
            </button>
                <ul class="dropdown-menu quick-add-dropdown mobile-bottom-nav-dropdown dropdown-menu-up">
                    <li sec:authorize="hasRole('PARENT')">
                        <a class="dropdown-item" th:href="@{/tasks/create}">
                            <i class="fa-solid fa-list-check"></i>
                            <span class="dropdown-item-copy">
                            <span class="dropdown-item-label">Add task</span>
                            <span class="dropdown-item-meta">Plan something to do</span>
                        </span>
                    </a>
                </li>
                <li sec:authorize="hasRole('PARENT')">
                    <a class="dropdown-item" th:href="@{/events/create}">
                        <i class="fa-regular fa-calendar-plus"></i>
                        <span class="dropdown-item-copy">
                            <span class="dropdown-item-label">Add event</span>
                            <span class="dropdown-item-meta">Schedule family time</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        <a class="mobile-bottom-nav-link"
           th:href="@{/family}"
           th:classappend="${currentUri != null && currentUri.startsWith('/family')} ? ' active'">
            <i class="fa-solid fa-people-roof"></i>
            <span>Family</span>
        </a>
    </nav>

</div>
</body>
</html>
