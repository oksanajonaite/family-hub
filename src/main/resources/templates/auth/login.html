<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body style="background-color: var(--bg-body); min-height: 100vh;" class="d-flex align-items-center justify-content-center">

<div style="width: 100%; max-width: 400px; padding: 1rem;">

    <div class="widget-card">
        <div class="widget-header deep-clay text-center" style="font-size: 1.05rem; padding: 14px 16px;">
            <i class="fa-solid fa-house-heart me-2"></i> Family Hub
        </div>
        <div class="widget-body p-4">

            <div th:if="${param.error}" class="alert alert-danger py-2 small">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 small">
                You have been logged out.
            </div>
            <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-500 text-clay">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small fw-500 text-clay">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input">
                    <label for="remember-me" class="form-check-label small text-earth-muted">Remember me</label>
                </div>
                <button type="submit" class="btn btn-terracotta w-100">Log in</button>
            </form>

            <hr style="border-color: rgba(90,62,46,0.15);">
            <p class="text-center mb-1 small">
                No account? <a th:href="@{/register}" style="color: var(--color-terracotta);">Register</a>
            </p>
            <p class="text-center mb-0">
                <a th:href="@{/forgot-password}" class="text-earth-muted small text-decoration-none">Forgot password?</a>
            </p>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
