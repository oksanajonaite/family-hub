<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell">
<div class="auth-wrap">
    <section class="auth-brand-card">
        <div class="d-flex flex-column gap-4">
            <div class="auth-logo-row">
                <img class="auth-logo" th:src="@{/img/logo.svg}" alt="Family Hub logo">
                <div>
                    <h1 class="auth-brand-title">Family Hub</h1>
                    <p class="auth-brand-subtitle">Reset access without losing the calm, warm product feel.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="auth-form-card">
        <div class="auth-form-top">
            <span class="auth-form-kicker"><i class="fa-solid fa-key"></i> Account recovery</span>
            <h2 class="auth-form-title">Forgot password</h2>
            <p class="auth-form-subtitle">Enter your email and we will send you a reset link.</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

        <form th:action="@{/forgot-password}" th:object="${forgotRequest}" method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="your@email.com">
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
            <button type="submit" class="btn btn-terracotta w-100">Send reset link</button>
        </form>

        <hr class="auth-divider">
        <div class="text-center">
            <a th:href="@{/login}" class="text-earth-muted small text-decoration-none">Back to login</a>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
