spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familyapp_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  # Force English locale for all Thymeleaf date formatting (#temporals.format)
  # Without this, JVM default locale (Lithuanian) produces Lithuanian month names
  web:
    locale: en_US
    locale-resolver: fixed

  mail:
    host: localhost
    port: 1025
    # No credentials needed — Mailpit accepts all connections without authentication.
    # For production, switch to Brevo: host: smtp-relay.brevo.com, port: 587,
    # username: ${MAIL_USERNAME}, password: ${MAIL_PASSWORD}, auth: true, starttls: true
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  devtools:
    restart:
      enabled: false

server:
  servlet:
    session:
      persistent: false

app:
  base-url: http://localhost:8080
  remember-me:
    key: ${REMEMBER_ME_KEY:family-hub-dev-secret-change-in-prod}
    validity-seconds: 2592000  # 30 days

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION:eu-north-1}
