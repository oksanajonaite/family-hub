<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" th:href="@{/dashboard}">Family Hub</a>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <!-- Tas pats form.html naudojamas tiek create, tiek edit.
         Jei taskId yra — tai edit, jei ne — create -->
    <h4 th:text="${taskId != null} ? 'Edit task' : 'New task'">Task</h4>

    <form th:action="${taskId != null} ? @{/tasks/{id}/edit(id=${taskId})} : @{/tasks/create}"
          th:object="${taskRequest}"
          method="post"
          class="mt-3">

        <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" th:field="*{title}" class="form-control"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Priority *</label>
            <select th:field="*{priority}" class="form-select">
                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Assign to</label>
            <select th:field="*{assignedToUserId}" class="form-select">
                <option value="">— Unassigned —</option>
                <option th:each="member : ${members}"
                        th:value="${member.id}"
                        th:text="${member.displayName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Due date</label>
            <input type="date" th:field="*{dueDate}" class="form-control">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
