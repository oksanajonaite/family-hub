<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 500px;">

    <h4 class="text-clay fw-semibold mb-4"
        th:text="${petId != null} ? 'Edit Pet' : 'Add Pet'"></h4>

    <div class="widget-card">
        <div class="widget-body">
            <form th:action="${petId != null} ? @{/pets/{id}/edit(id=${petId})} : @{/pets/create}"
                  th:object="${petRequest}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Name *</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Type <span class="text-earth-muted fw-normal">(optional)</span></label>
                    <input type="text" th:field="*{type}" class="form-control"
                           placeholder="e.g. Dog, Cat, Chinchilla, Parrot..."
                           th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{type}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-500 text-clay">
                        Date of Birth <span class="text-earth-muted fw-normal">(optional)</span>
                    </label>
                    <input type="text" id="dateOfBirth" name="dateOfBirth"
                           th:value="${petRequest.dateOfBirth}"
                           class="form-control"
                           placeholder="Select date" autocomplete="off">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-terracotta">Save</button>
                    <a th:href="@{/pets}" class="btn btn-outline-earth">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#dateOfBirth", {
        dateFormat: "Y-m-d",
        maxDate: "today",
        minDate: "1926-01-01",
        allowInput: true,
        disableMobile: true
    });
</script>
</body>
</html>
