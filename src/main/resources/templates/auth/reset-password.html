<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 420px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="mb-4">Set New Password</h4>

            <form th:action="@{/reset-password}"
                  th:object="${resetRequest}"
                  method="post">

                <!-- Token'as perduodamas kaip hidden laukas — vartotojas jo nemato,
                     bet jis būtinas POST request'e slaptažodžio keitimui -->
                <input type="hidden" th:field="*{token}">

                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input type="password"
                           th:field="*{newPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                           placeholder="Min. 8 characters">
                    <div class="invalid-feedback" th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm password</label>
                    <input type="password"
                           th:field="*{confirmPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                           placeholder="Repeat password">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Change Password</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
