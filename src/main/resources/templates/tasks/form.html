<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 600px;">

    <h4 class="text-clay fw-semibold mb-4"
        th:text="${taskId != null} ? 'Edit Task' : 'New Task'"></h4>

    <div class="widget-card">
        <div class="widget-body">
            <form th:action="${taskId != null} ? @{/tasks/{id}/edit(id=${taskId})} : @{/tasks/create}"
                  th:object="${taskRequest}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Title *</label>
                    <input type="text" th:field="*{title}" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col">
                        <label class="form-label small fw-500 text-clay">Priority *</label>
                        <select th:field="*{priority}" id="prioritySelect" class="form-select">
                            <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                        </select>
                    </div>
                    <div class="col">
                        <label class="form-label small fw-500 text-clay">
                            Due date <span class="text-earth-muted fw-normal">(optional)</span>
                        </label>
                        <!-- type="text" — Flatpickr replaces native picker; dateFormat "Y-m-d" matches Spring @DateTimeFormat ISO.DATE -->
                        <input type="text" id="dueDate" name="dueDate"
                               th:value="${taskRequest.dueDate}"
                               class="form-control"
                               placeholder="Select date" autocomplete="off">
                    </div>
                </div>

                <!-- Assign to checkbox list -->
                <div class="mb-4">
                    <label class="form-label small fw-500 text-clay">Assign to</label>
                    <div class="p-3" style="border-radius:var(--radius-md);border:1px solid rgba(139,99,85,0.25);background:rgba(255,250,242,0.5);">

                        <div th:each="member : ${members}" class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:id="${'user-' + member.id}"
                                   th:name="assigneeIds"
                                   th:value="${'USER_' + member.id}"
                                   th:checked="${assigneeIds != null and #lists.contains(assigneeIds, 'USER_' + member.id)}">
                            <label class="form-check-label small" th:for="${'user-' + member.id}"
                                   th:text="${member.displayName}"></label>
                        </div>

                        <div th:each="fm : ${familyMembers}" class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:id="${'member-' + fm.id}"
                                   th:name="assigneeIds"
                                   th:value="${'MEMBER_' + fm.id}"
                                   th:checked="${assigneeIds != null and #lists.contains(assigneeIds, 'MEMBER_' + fm.id)}">
                            <label class="form-check-label small" th:for="${'member-' + fm.id}"
                                   th:text="${fm.name}"></label>
                        </div>

                        <p th:if="${#lists.isEmpty(members) and #lists.isEmpty(familyMembers)}"
                           class="text-earth-muted small mb-0">No family members yet.</p>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-terracotta">Save</button>
                    <a th:href="@{/tasks}" class="btn btn-outline-earth">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // Date picker for due date
    flatpickr("#dueDate", {
        dateFormat: "Y-m-d",
        allowInput: true,
        disableMobile: true
    });

    // Color the priority select based on its current value
    const priorityColors = {
        'HIGH':   { bg: 'rgba(184,105,58,0.12)', color: '#B8693A', border: 'rgba(184,105,58,0.35)' },
        'MEDIUM': { bg: 'rgba(107,124,74,0.10)', color: '#6B7C4A', border: 'rgba(107,124,74,0.30)' },
        'LOW':    { bg: 'rgba(90,62,46,0.07)',   color: '#8B6355', border: 'rgba(90,62,46,0.20)'   }
    };

    function colorPriority(sel) {
        const s = priorityColors[sel.value] || {};
        sel.style.backgroundColor = s.bg    || '';
        sel.style.color            = s.color || '';
        sel.style.borderColor      = s.border|| '';
    }

    const prioritySelect = document.getElementById('prioritySelect');
    if (prioritySelect) {
        colorPriority(prioritySelect);
        prioritySelect.addEventListener('change', () => colorPriority(prioritySelect));
    }
</script>
</body>
</html>
