<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invalid Link – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body style="background-color: var(--bg-body); min-height: 100vh;" class="d-flex align-items-center justify-content-center">

<div style="width: 100%; max-width: 420px; padding: 1rem;">

    <div class="widget-card">
        <div class="widget-header terracotta text-center" style="font-size: 1.05rem; padding: 14px 16px;">
            <i class="fa-solid fa-house-heart me-2"></i> Family Hub
        </div>
        <div class="widget-body p-4 text-center">

            <i class="fa-solid fa-link-slash mb-3" style="font-size: 2rem; color: var(--color-terracotta);"></i>
            <h6 class="text-clay fw-semibold mb-2">Link Expired</h6>
            <p class="text-earth-muted small mb-3" th:text="${errorMessage}">
                This reset link is invalid or has expired.
            </p>
            <a th:href="@{/forgot-password}" class="btn btn-terracotta">Request New Link</a>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
