<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invalid Link - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell">
<div class="auth-wrap">
    <section class="auth-brand-card">
        <div class="d-flex flex-column gap-4">
            <div class="auth-logo-row">
                <img class="auth-logo" th:src="@{/img/logo.svg}" alt="Family Hub logo">
                <div>
                    <h1 class="auth-brand-title">Family Hub</h1>
                    <p class="auth-brand-subtitle">Even recovery states should feel like part of the same product.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="auth-form-card">
        <div class="auth-form-top">
            <span class="auth-form-kicker"><i class="fa-solid fa-link-slash"></i> Reset unavailable</span>
            <h2 class="auth-form-title">Link expired</h2>
            <p class="auth-form-subtitle" th:text="${errorMessage}">This reset link is invalid or has expired.</p>
        </div>

        <a th:href="@{/forgot-password}" class="btn btn-terracotta w-100">Request new link</a>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
