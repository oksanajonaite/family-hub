<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  th:fragment="appShell" - sidebar + topbar layout.
  Include in authenticated templates:
      <div th:replace="~{fragments/navbar :: appShell}"></div>

  Content must be wrapped in:
      <div class="app-content" id="appContent">
          ...your page content...
      </div>

  Sidebar state (collapsed/expanded) is stored in localStorage key "sidebarCollapsed".
-->
<div th:fragment="appShell"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

    <aside class="app-sidebar" id="appSidebar">
        <a class="sidebar-logo" th:href="@{/dashboard}">
            <img class="sidebar-logo-img"
                 th:src="@{/img/logo.svg}"
                 alt="Family Hub logo">
            <span class="sidebar-logo-text">
                <span class="sidebar-logo-title">Family Hub</span>
            </span>
        </a>

        <nav class="sidebar-nav" sec:authorize="!hasRole('ADMIN')">
            <div class="sidebar-nav-item">
                <a class="sidebar-nav-link"
                   th:href="@{/dashboard}"
                   th:classappend="${currentUri == '/dashboard'} ? ' active'">
                    <i class="sidebar-nav-icon fa-solid fa-house"></i>
                    <span class="sidebar-nav-label">Dashboard</span>
                </a>
                <span class="sidebar-tooltip">Dashboard</span>
            </div>

            <div class="sidebar-nav-item">
                <a class="sidebar-nav-link"
                   th:href="@{/family}"
                   th:classappend="${currentUri != null && currentUri.startsWith('/family')} ? ' active'">
                    <i class="sidebar-nav-icon fa-solid fa-people-roof"></i>
                    <span class="sidebar-nav-label">Family</span>
                </a>
                <span class="sidebar-tooltip">Family</span>
            </div>

        </nav>

        <nav class="sidebar-nav" sec:authorize="hasRole('ADMIN')">
            <div class="sidebar-nav-item">
                <a class="sidebar-nav-link"
                   th:href="@{/admin}"
                   th:classappend="${currentUri != null && currentUri.startsWith('/admin')} ? ' active'">
                    <i class="sidebar-nav-icon fa-solid fa-shield-halved"></i>
                    <span class="sidebar-nav-label">Admin Panel</span>
                </a>
                <span class="sidebar-tooltip">Admin Panel</span>
            </div>
        </nav>

    </aside>

    <header class="app-topbar" id="appTopbar">
        <div class="topbar-left">
            <button class="topbar-hamburger"
                    onclick="handleHamburger()"
                    title="Toggle menu"
                    aria-label="Toggle navigation">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>

        <div class="topbar-right">
            <div class="topbar-greeting" sec:authorize="!hasRole('ADMIN')">
                <span class="topbar-greeting-label">Welcome,</span>
                <span class="topbar-greeting-name" sec:authentication="principal.displayName"></span>
            </div>
            <a class="topbar-bell" th:href="@{/notifications}"
               sec:authorize="!hasRole('ADMIN')"
               title="Notifications">
                <i class="fa-regular fa-bell"></i>
                <span class="topbar-bell-badge"
                      th:if="${unreadCount != null and unreadCount > 0}"></span>
            </a>
            <div class="dropdown" sec:authorize="!hasRole('ADMIN')">
                <button class="btn-quick-add dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add</span>
                </button>
                <ul class="dropdown-menu quick-add-dropdown dropdown-menu-end">
                    <!--
                        sec:authorize="hasRole('PARENT')" — Thymeleaf Security dialect.
                        The entire <li> is removed from the rendered HTML for KID users.
                        This is a UI convenience only — the real access control is in the controller.
                    -->
                    <li sec:authorize="hasRole('PARENT')">
                        <a class="dropdown-item" th:href="@{/tasks/create}">
                            <i class="fa-solid fa-list-check"></i>
                            <span class="dropdown-item-copy">
                                <span class="dropdown-item-label">Add task</span>
                                <span class="dropdown-item-meta">Plan something to do</span>
                            </span>
                        </a>
                    </li>
                    <li sec:authorize="hasRole('PARENT')">
                        <a class="dropdown-item" th:href="@{/events/create}">
                            <i class="fa-regular fa-calendar-plus"></i>
                            <span class="dropdown-item-copy">
                                <span class="dropdown-item-label">Add event</span>
                                <span class="dropdown-item-meta">Schedule family time</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" th:href="@{/family}">
                            <i class="fa-solid fa-people-roof"></i>
                            <span class="dropdown-item-copy">
                                <span class="dropdown-item-label">Open family</span>
                                <span class="dropdown-item-meta">Jump to members and pets</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="dropdown">
                <button class="topbar-avatar-btn dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <div class="topbar-avatar"
                         th:text="${#strings.substring(#authentication.principal.displayName, 0, 1)}">U</div>
                    <span class="topbar-username"
                          sec:authentication="principal.displayName"></span>
                </button>
                <ul class="dropdown-menu topbar-avatar-dropdown dropdown-menu-end">
                    <li>
                        <span class="dropdown-item-text small text-earth-muted px-3 py-1"
                              sec:authentication="principal.displayName"></span>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="mb-0">
                            <button type="submit"
                                    class="dropdown-item text-danger">
                                <i class="fa-solid fa-right-from-bracket"></i> Log out
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <script>
        const SIDEBAR_KEY = "fhSidebarCollapsed";
        const sidebar = document.getElementById("appSidebar");
        const topbar = document.getElementById("appTopbar");
        const backdrop = document.getElementById("sidebarBackdrop");

        function getContent() {
            return document.getElementById("appContent");
        }

        if (localStorage.getItem(SIDEBAR_KEY) === "true") {
            applySidebarState(true);
        }

        function applySidebarState(collapsed) {
            const content = getContent();
            sidebar.classList.toggle("collapsed", collapsed);
            topbar.classList.toggle("sidebar-collapsed", collapsed);
            if (content) {
                content.classList.toggle("sidebar-collapsed", collapsed);
            }
        }

        function toggleSidebar() {
            const isCollapsed = sidebar.classList.toggle("collapsed");
            const content = getContent();
            topbar.classList.toggle("sidebar-collapsed", isCollapsed);
            if (content) {
                content.classList.toggle("sidebar-collapsed", isCollapsed);
            }
            localStorage.setItem(SIDEBAR_KEY, isCollapsed);
        }

        function handleHamburger() {
            if (window.innerWidth < 768) {
                openMobileSidebar();
            } else {
                toggleSidebar();
            }
        }

        function openMobileSidebar() {
            sidebar.classList.add("mobile-open");
            backdrop.classList.add("visible");
            document.body.style.overflow = "hidden";
        }

        function closeMobileSidebar() {
            sidebar.classList.remove("mobile-open");
            backdrop.classList.remove("visible");
            document.body.style.overflow = "";
        }

        window.addEventListener("resize", () => {
            if (window.innerWidth >= 768) {
                closeMobileSidebar();
            }
        });

        window.addEventListener("DOMContentLoaded", () => {
            applySidebarState(localStorage.getItem(SIDEBAR_KEY) === "true");
        });

    </script>

</div>
</body>
</html>
