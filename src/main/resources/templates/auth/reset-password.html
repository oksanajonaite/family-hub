<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body style="background-color: var(--bg-body); min-height: 100vh;" class="d-flex align-items-center justify-content-center">

<div style="width: 100%; max-width: 420px; padding: 1rem;">

    <div class="widget-card">
        <div class="widget-header deep-clay text-center" style="font-size: 1.05rem; padding: 14px 16px;">
            <i class="fa-solid fa-house-heart me-2"></i> Family Hub
        </div>
        <div class="widget-body p-4">

            <h6 class="text-clay fw-semibold mb-3">Set New Password</h6>

            <form th:action="@{/reset-password}" th:object="${resetRequest}" method="post">

                <!-- Token passed as hidden field — not visible to the user,
                     but required in the POST request to identify the reset session -->
                <input type="hidden" th:field="*{token}">

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">New password</label>
                    <input type="password"
                           th:field="*{newPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                           placeholder="Min. 8 characters">
                    <div class="invalid-feedback" th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Confirm password</label>
                    <input type="password"
                           th:field="*{confirmPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                           placeholder="Repeat password">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-terracotta w-100">Change Password</button>
            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
