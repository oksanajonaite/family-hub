<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/minty/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <!-- Statistikos kortelės -->
    <!-- Bootstrap grid: 4 kortelės vienoje eilutėje -->
    <div class="row g-3 mb-5">

        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h6 class="card-title">Total Users</h6>
                    <!-- th:text — dinamiškai įrašo reikšmę iš model atributo -->
                    <p class="display-6 mb-0" th:text="${totalUsers}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h6 class="card-title">Total Families</h6>
                    <p class="display-6 mb-0" th:text="${totalFamilies}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h6 class="card-title">Users Without Family</h6>
                    <p class="display-6 mb-0" th:text="${usersWithoutFamily}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h6 class="card-title">Total Notifications</h6>
                    <p class="display-6 mb-0" th:text="${totalNotifications}">0</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Vartotojų lentelė -->
    <h4 class="mb-3">Users</h4>
    <div class="table-responsive mb-5">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Display Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Family</th>
                    <th>Registered</th>
                </tr>
            </thead>
            <tbody>
                <!-- th:each — ciklas per visus vartotojus -->
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.displayName}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <!-- Badge spalva pagal rolę -->
                        <span th:text="${user.role}"
                              th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' :
                                             (${user.role.name() == 'PARENT'} ? 'bg-primary' : 'bg-secondary')"
                              class="badge">
                        </span>
                    </td>
                    <td>
                        <!-- Jei vartotojas turi šeimą — rodome pavadinimą, jei ne — brūkšnelį -->
                        <span th:if="${user.family != null}" th:text="${user.family.name}"></span>
                        <span th:if="${user.family == null}" class="text-muted">—</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Šeimų lentelė -->
    <h4 class="mb-3">Families</h4>
    <div class="table-responsive mb-5">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Created By</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="family : ${families}">
                    <td th:text="${family.id}"></td>
                    <td th:text="${family.name}"></td>
                    <td th:text="${family.createdBy.displayName}"></td>
                    <td th:text="${#temporals.format(family.createdAt, 'yyyy-MM-dd')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
