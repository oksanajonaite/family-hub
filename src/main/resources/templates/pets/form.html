<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pet – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">

<div class="container py-4 content-narrow">

    <div class="page-backbar">
        <a th:href="@{/family}" data-back-url="/family" class="page-back-link">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to family</span>
        </a>
    </div>

    <h4 class="text-clay fw-semibold mb-4"
        th:text="${petId != null} ? 'Edit Pet' : 'Add Pet'"></h4>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Photo upload: shown only when editing (petId is set), not when creating. -->
    <div th:if="${petId != null}" class="widget-card mb-3">
        <div class="widget-body">
            <form th:action="@{/pets/{id}/photo(id=${petId})}" method="post" enctype="multipart/form-data">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="form-label small fw-500 text-clay">Photo</label>
                <div class="avatar-upload-row">
                    <img th:if="${currentPet != null and currentPet.photoUrl != null}"
                         class="avatar-upload-preview"
                         th:src="@{/api/photo/pet/{id}(id=${petId})}"
                         alt="Current photo">
                    <div th:unless="${currentPet != null and currentPet.photoUrl != null}"
                         class="avatar-upload-placeholder">
                        <i class="fa-solid fa-paw"></i>
                    </div>
                    <div class="avatar-upload-controls">
                        <input type="file" name="file" class="form-control form-control-sm"
                               accept="image/jpeg,image/png,image/webp">
                        <div class="alert alert-danger py-1 px-2 mt-2 mb-0 small d-none" id="photoSizeError">
                            Photo is too large. Maximum allowed size is 5 MB.
                        </div>
                        <button type="submit" class="btn btn-outline-earth btn-sm mt-2">Upload photo</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="widget-card">
        <div class="widget-body">
            <form th:action="${petId != null} ? @{/pets/{id}/edit(id=${petId})} : @{/pets/create}"
                  th:object="${petRequest}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Name *</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Type <span class="text-earth-muted fw-normal">(optional)</span></label>
                    <input type="text" th:field="*{type}" class="form-control"
                           placeholder="e.g. Dog, Cat, Chinchilla, Parrot..."
                           th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{type}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-500 text-clay">
                        Date of Birth <span class="text-earth-muted fw-normal">(optional)</span>
                    </label>
                    <input type="text" id="dateOfBirth" name="dateOfBirth"
                           th:value="${petRequest.dateOfBirth}"
                           class="form-control"
                           placeholder="Select date" autocomplete="off">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-terracotta">Save</button>
                    <a th:href="@{/family}" class="btn btn-outline-earth">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });

    flatpickr("#dateOfBirth", {
        dateFormat: "Y-m-d",
        maxDate: "today",
        minDate: "1926-01-01",
        allowInput: true,
        disableMobile: true,
        locale: { firstDayOfWeek: 1 }
    });

    // Client-side file size validation prevents ERR_CONNECTION_RESET when the file
    // exceeds the server limit. The server-side 5 MB limit remains as a security backstop.
    document.querySelectorAll('input[type="file"]').forEach((input) => {
        const errorDiv = document.getElementById('photoSizeError');
        input.addEventListener('change', () => {
            const file = input.files[0];
            if (!file) return;
            const maxBytes = 5 * 1024 * 1024;
            if (file.size > maxBytes) {
                errorDiv.classList.remove('d-none');
                input.value = '';
            } else {
                errorDiv.classList.add('d-none');
            }
        });
    });
</script>
</div><!-- /app-content -->

</body>
</html>
