<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell auth-shell-minimal">
<div class="auth-minimal-wrap">
    <section class="auth-form-card auth-form-card-minimal auth-form-card-no-splash">
        <div class="auth-form-top auth-form-top-minimal">
            <h2 class="auth-form-title">Forgot password</h2>
            <p class="auth-form-subtitle auth-form-subtitle-minimal">Enter your email and we will send you a reset link.</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

        <form th:action="@{/forgot-password}" th:object="${forgotRequest}" method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="your@email.com">
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
            <button type="submit" class="btn btn-terracotta w-100">Send reset link</button>
        </form>

        <div class="auth-minimal-links">
            <p class="text-center mb-0">
                <a th:href="@{/login}" class="text-earth-muted small text-decoration-none">Back to login</a>
            </p>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
