<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invalid Link - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell auth-shell-minimal">
<div class="auth-minimal-wrap">
    <section class="auth-form-card auth-form-card-minimal auth-form-card-no-splash">
        <div class="auth-form-top auth-form-top-minimal">
            <h2 class="auth-form-title">Link expired</h2>
            <p class="auth-form-subtitle auth-form-subtitle-minimal" th:text="${errorMessage}">This reset link is invalid or has expired.</p>
        </div>

        <a th:href="@{/forgot-password}" class="btn btn-terracotta w-100">Request new link</a>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
