<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div class="page-backbar">
            <a th:href="${backUrl}" th:attr="data-back-url=${backUrl}" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span th:text="${backLabel}">Back</span>
            </a>
        </div>

        <section class="page-hero">
            <div class="page-hero-copy">
                <span class="page-kicker"><i class="fa-solid fa-list-check"></i> Task editor</span>
                <h1 class="page-title" th:text="${formData.taskId != null} ? 'Edit task' : 'Create a new task'">Task</h1>
                <p class="page-subtitle">Keep it simple: what needs to be done, when it matters, and who should see it.</p>
            </div>
        </section>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="form-layout form-layout-single">
            <div class="surface-card form-panel">
                <form th:action="${formData.taskId != null} ? @{/tasks/{id}/edit(id=${formData.taskId})} : @{/tasks/create}"
                      th:object="${taskRequest}"
                      method="post">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input th:if="${fromDashboard}" type="hidden" name="from" value="dashboard">

                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" th:field="*{title}" class="form-control"
                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                               placeholder="e.g. Pack school bag">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control event-description-input" rows="1"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                  placeholder="Optional context"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Priority *</label>
                            <select th:field="*{priority}" id="prioritySelect" class="form-select">
                                <option th:each="p : ${formData.priorities}" th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Due date</label>
                            <input type="text" id="dueDate" name="dueDate"
                                   th:value="${taskRequest.dueDate}"
                                   class="form-control"
                                   placeholder="Select date (optional)" autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Assign to</label>
                        <div class="selection-panel">
                            <div class="selection-list-plain" th:if="${not #lists.isEmpty(formData.registeredUsers) or not #lists.isEmpty(formData.familyMembers)}">
                                <div th:each="user : ${formData.registeredUsers}" class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:id="${'user-' + user.id}"
                                           th:name="assigneeIds"
                                           th:value="${'USER_' + user.id}"
                                           th:checked="${formData.assigneeIds != null and #lists.contains(formData.assigneeIds, 'USER_' + user.id)}">
                                    <label class="form-check-label small" th:for="${'user-' + user.id}" th:text="${user.displayName}"></label>
                                </div>
                                <div th:each="fm : ${formData.familyMembers}" class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:id="${'member-' + fm.id}"
                                           th:name="assigneeIds"
                                           th:value="${'MEMBER_' + fm.id}"
                                           th:checked="${formData.assigneeIds != null and #lists.contains(formData.assigneeIds, 'MEMBER_' + fm.id)}">
                                    <label class="form-check-label small" th:for="${'member-' + fm.id}" th:text="${fm.name}"></label>
                                </div>
                            </div>

                            <p th:if="${#lists.isEmpty(formData.registeredUsers) and #lists.isEmpty(formData.familyMembers)}"
                               class="text-earth-muted small mb-0">No family members available yet.</p>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" name="submitAction" value="save" class="btn btn-terracotta">Save task</button>
                        <a th:href="${backUrl}" class="btn btn-outline-earth">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
    flatpickr("#dueDate", { dateFormat: "Y-m-d", allowInput: true, disableMobile: true });
    const priorityColors = {
        'HIGH':   { bg: 'rgba(184,105,58,0.12)', color: '#B8693A', border: 'rgba(184,105,58,0.35)' },
        'MEDIUM': { bg: 'rgba(107,124,74,0.10)', color: '#6B7C4A', border: 'rgba(107,124,74,0.30)' },
        'LOW':    { bg: 'rgba(90,62,46,0.07)', color: '#8B6355', border: 'rgba(90,62,46,0.20)' }
    };
    function colorPriority(sel) {
        const s = priorityColors[sel.value] || {};
        sel.style.backgroundColor = s.bg || '';
        sel.style.color = s.color || '';
        sel.style.borderColor = s.border || '';
    }
    const prioritySelect = document.getElementById('prioritySelect');
    if (prioritySelect) {
        colorPriority(prioritySelect);
        prioritySelect.addEventListener('change', () => colorPriority(prioritySelect));
    }
</script>
</body>
</html>
