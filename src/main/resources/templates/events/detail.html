<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${event.title} + ' - Family Hub'">Event - Family Hub</title>
    <th:block th:replace="~{fragments/head-meta :: appMeta}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div class="page-backbar">
            <a th:href="${backUrl}" th:attr="data-back-url=${backUrl}" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span th:text="${backLabel}">Back</span>
            </a>
        </div>

        <article class="surface-card catalog-card event-detail-single">
            <div class="catalog-card-head">
                <div class="list-card-topline">
                    <span class="list-card-icon olive catalog-card-icon">
                        <i th:class="${(event.type != null ? event.type.icon : 'fa-regular fa-calendar')}"></i>
                    </span>
                    <h1 class="list-card-title" th:text="${event.title}">Event title</h1>
                    <span class="soft-chip terracotta" th:if="${event.privateEvent}">
                        <i class="fa-solid fa-lock"></i>
                        Private
                    </span>
                    <span class="soft-chip olive"
                          th:if="${event.recurrenceType != null and event.recurrenceType.name() != 'NONE'}"
                          th:text="${event.recurrenceType}">
                        Repeat
                    </span>
                </div>
                <div class="catalog-actions" th:if="${canEdit}">
                    <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-outline-earth btn-sm">Edit</a>
                    <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post"
                          data-confirm="Delete this event?">
                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>

            <div class="text-earth-muted small catalog-copy"
                 th:if="${event.description != null and !#strings.isEmpty(event.description)}"
                 th:text="${event.description}">
            </div>

            <div class="catalog-meta">
                <span>
                    <i class="fa-regular fa-clock me-1"></i>
                    <span th:text="${#temporals.format(event.startsAt, 'MMM d, HH:mm')}"></span>
                    <span th:if="${event.endsAt != null}">
                        ? <span th:text="${#temporals.format(event.endsAt, 'HH:mm')}"></span>
                    </span>
                </span>
                <span th:if="${event.recurrenceUntil != null}">
                    <i class="fa-solid fa-rotate me-1"></i>
                    Until <span th:text="${#temporals.format(event.recurrenceUntil, 'MMM d')}"></span>
                </span>
                <span th:if="${not #lists.isEmpty(event.participantNames)}">
                    <i class="fa-solid fa-user-group me-1"></i>
                    <span th:text="${#strings.listJoin(event.participantNames, ', ')}"></span>
                </span>
            </div>
        </article>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-modal :: confirm-modal}"></div>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
</script>
</body>
</html>
