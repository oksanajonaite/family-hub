<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body class="auth-shell auth-shell-minimal">
<div class="auth-minimal-wrap">
    <section class="auth-minimal-brand">
        <img class="auth-minimal-logo" th:src="@{/img/logo.svg}" alt="Family Hub logo">
        <h1 class="auth-minimal-title">FAMILY HUB</h1>
    </section>

    <section class="auth-form-card auth-form-card-minimal auth-form-card-wide">
        <div class="auth-form-top auth-form-top-minimal">
            <h2 class="auth-form-title">Create account</h2>
            <p class="auth-form-subtitle auth-form-subtitle-minimal">Set up your profile and join your family flow.</p>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label for="displayName" class="form-label">Display name</label>
                <input type="text" id="displayName" th:field="*{displayName}" class="form-control"
                       th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{displayName}"></div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>
            <div class="mb-3">
                <label for="dateOfBirth" class="form-label">Date of birth <span class="text-earth-muted fw-normal">(optional)</span></label>
                <input type="text" id="dateOfBirth" name="dateOfBirth"
                       th:value="${registerRequest.dateOfBirth}"
                       class="form-control" th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'"
                       placeholder="Select date" autocomplete="off">
                <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
            </div>
            <button type="submit" class="btn btn-terracotta w-100">Register</button>
        </form>

        <div class="auth-minimal-links">
            <p class="text-center mb-0 small">Already have an account? <a th:href="@{/login}" class="auth-link">Log in</a></p>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#dateOfBirth", {
        dateFormat: "Y-m-d",
        maxDate: "today",
        minDate: "1926-01-01",
        allowInput: true,
        disableMobile: true,
        locale: { firstDayOfWeek: 1 }
    });
</script>
</body>
</html>
