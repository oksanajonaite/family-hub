<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.title} + ' - Family Hub'">Event - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div class="page-backbar">
            <a th:href="${backUrl}" th:attr="data-back-url=${backUrl}" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span th:text="${backLabel}">Back</span>
            </a>
        </div>

        <section class="page-hero">
            <div class="page-hero-copy">
                <span class="page-kicker">
                    <i th:class="${event.type != null ? event.type.icon : 'fa-regular fa-calendar'}"></i>
                    <span th:text="${event.type != null ? event.type.label : 'Event'}">Event</span>
                </span>
                <h1 class="page-title" th:text="${event.title}">Event title</h1>
                <p class="page-subtitle" th:if="${event.description != null and !#strings.isEmpty(event.description)}"
                   th:text="${event.description}"></p>
            </div>
            <div class="page-actions" th:if="${canEdit}">
                <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-outline-earth">
                    <i class="fa-solid fa-pen me-1"></i> Edit
                </a>
                <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post"
                      data-confirm="Delete this event?">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger">
                        <i class="fa-solid fa-trash me-1"></i> Delete
                    </button>
                </form>
            </div>
        </section>

        <div class="form-layout">
            <div class="surface-card form-panel">

                <!-- Date & time -->
                <div class="detail-row">
                    <span class="detail-label">
                        <i class="fa-regular fa-clock me-1"></i> Date &amp; time
                    </span>
                    <span class="detail-value">
                        <span th:text="${#temporals.format(event.startsAt, 'EEEE, MMM d, yyyy')}"></span>
                        <span th:text="${' at ' + #temporals.format(event.startsAt, 'HH:mm')}"></span>
                        <span th:if="${event.endsAt != null}"
                              th:text="${' → ' + #temporals.format(event.endsAt, 'HH:mm')}"></span>
                    </span>
                </div>

                <!-- Recurrence -->
                <div class="detail-row" th:if="${event.recurrenceType != null and event.recurrenceType.name() != 'NONE'}">
                    <span class="detail-label">
                        <i class="fa-solid fa-rotate me-1"></i> Repeats
                    </span>
                    <span class="detail-value">
                        <span th:text="${event.recurrenceType}"></span>
                        <span th:if="${event.recurrenceUntil != null}"
                              th:text="${' until ' + #temporals.format(event.recurrenceUntil, 'MMM d, yyyy')}"></span>
                    </span>
                </div>

                <!-- Participants -->
                <div class="detail-row" th:if="${not #lists.isEmpty(event.participantNames)}">
                    <span class="detail-label">
                        <i class="fa-solid fa-user-group me-1"></i> Participants
                    </span>
                    <span class="detail-value" th:text="${#strings.listJoin(event.participantNames, ', ')}"></span>
                </div>

                <!-- Visibility -->
                <div class="detail-row" th:if="${event.privateEvent}">
                    <span class="detail-label">
                        <i class="fa-solid fa-lock me-1"></i> Visibility
                    </span>
                    <span class="detail-value">
                        <span class="soft-chip terracotta"><i class="fa-solid fa-lock me-1"></i>Private — only you can see this event</span>
                    </span>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-modal :: confirm-modal}"></div>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
</script>
</body>
</html>
