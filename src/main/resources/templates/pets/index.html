<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pets – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/minty/bootstrap.min.css">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Pets</h2>
        <a th:if="${isParent}" th:href="@{/pets/create}" class="btn btn-primary">+ Add Pet</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(pets)}" class="text-muted text-center mt-5">
        <p>No pets added yet.</p>
    </div>

    <div th:each="pet : ${pets}" class="card mb-2">
        <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center">
            <div>
                <strong th:text="${pet.name}"></strong>
                <span class="badge bg-secondary ms-2" th:text="${pet.type}"></span>
                <!-- Gimimo data rodoma tik jei nurodyta -->
                <span th:if="${pet.dateOfBirth != null}" class="text-muted ms-2 small"
                      th:text="${'Born: ' + #temporals.format(pet.dateOfBirth, 'yyyy-MM-dd')}">
                </span>
            </div>
            <div th:if="${isParent}" class="d-flex gap-2">
                <a th:href="@{/pets/{id}/edit(id=${pet.id})}" class="btn btn-outline-secondary btn-sm">Edit</a>
                <form th:action="@{/pets/{id}/delete(id=${pet.id})}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('Remove this pet?')">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
