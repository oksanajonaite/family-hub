<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell">
<div class="auth-wrap">
    <section class="auth-brand-card">
        <div class="d-flex flex-column gap-4">
            <div class="auth-logo-row">
                <img class="auth-logo" th:src="@{/img/logo.svg}" alt="Family Hub logo">
                <div>
                    <h1 class="auth-brand-title">Family Hub</h1>
                    <p class="auth-brand-subtitle">Create a fresh password and get back to your family dashboard.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="auth-form-card">
        <div class="auth-form-top">
            <span class="auth-form-kicker"><i class="fa-solid fa-lock"></i> Secure reset</span>
            <h2 class="auth-form-title">Set new password</h2>
            <p class="auth-form-subtitle">Choose something secure and easy for you to remember.</p>
        </div>

        <form th:action="@{/reset-password}" th:object="${resetRequest}" method="post">
            <input type="hidden" th:field="*{token}">

            <div class="mb-3">
                <label class="form-label">New password</label>
                <input type="password" th:field="*{newPassword}" class="form-control"
                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                       placeholder="Min. 8 characters">
                <div class="invalid-feedback" th:errors="*{newPassword}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm password</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       placeholder="Repeat password">
                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-terracotta w-100">Change password</button>
        </form>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
