<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/flatpickr-earth.css}">
</head>
<body style="background-color: var(--bg-body); min-height: 100vh;" class="d-flex align-items-center justify-content-center">

<div style="width: 100%; max-width: 450px; padding: 1rem;">

    <div class="widget-card">
        <div class="widget-header deep-clay text-center" style="font-size: 1.05rem; padding: 14px 16px;">
            <i class="fa-solid fa-house-heart me-2"></i> Family Hub
        </div>
        <div class="widget-body p-4">

            <h6 class="text-clay fw-semibold mb-3">Create account</h6>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <div class="mb-3">
                    <label for="displayName" class="form-label small fw-500 text-clay">Display name</label>
                    <input type="text" id="displayName" th:field="*{displayName}"
                           class="form-control" th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{displayName}"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label small fw-500 text-clay">Email</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small fw-500 text-clay">Password</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>
                <div class="mb-3">
                    <label for="dateOfBirth" class="form-label small fw-500 text-clay">
                        Date of birth <span class="text-earth-muted fw-normal">(optional)</span>
                    </label>
                    <input type="text" id="dateOfBirth" name="dateOfBirth"
                           th:value="${registerRequest.dateOfBirth}"
                           class="form-control" th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'"
                           placeholder="Select date" autocomplete="off">
                    <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
                </div>
                <button type="submit" class="btn btn-terracotta w-100">Register</button>
            </form>

            <hr style="border-color: rgba(90,62,46,0.15);">
            <p class="text-center mb-0 small">
                Already have an account? <a th:href="@{/login}" style="color: var(--color-terracotta);">Log in</a>
            </p>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#dateOfBirth", {
        dateFormat: "Y-m-d",
        maxDate: "today",
        minDate: "1926-01-01",
        allowInput: true,
        disableMobile: true
    });
</script>
</body>
</html>
