<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 720px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 text-clay fw-semibold">
            <i class="fa-regular fa-bell me-1"></i> Notifications
            <span th:if="${unreadCount > 0}"
                  class="badge bg-danger ms-2 align-middle"
                  style="font-size:0.7rem;"
                  th:text="${unreadCount}"></span>
        </h4>
        <form th:if="${unreadCount > 0}"
              th:action="@{/notifications/read-all}"
              method="post">
            <button type="submit" class="btn btn-outline-earth btn-sm rounded-pill">
                Mark all as read
            </button>
        </form>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(notifications)}" class="text-earth-muted text-center mt-5 small">
        No notifications yet.
    </div>

    <div class="d-flex flex-column gap-2">
        <div th:each="notification : ${notifications}"
             class="widget-card"
             th:style="${!notification.read()} ? 'border-left: 3px solid var(--color-terracotta) !important;' : ''">
            <div class="widget-body">
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div class="flex-grow-1">
                        <!-- Notification type badge -->
                        <span class="badge rounded-pill mb-1"
                              style="background:rgba(90,62,46,0.10);color:var(--text-muted);font-size:0.65rem;"
                              th:text="${notification.type()}"></span>

                        <!-- Message — bold if unread -->
                        <p class="mb-1 small"
                           th:classappend="${!notification.read()} ? 'fw-semibold' : 'text-earth-muted'"
                           th:text="${notification.message()}"></p>

                        <!-- Timestamp -->
                        <small class="text-earth-muted"
                               th:text="${#temporals.format(notification.createdAt(), 'MMM d, HH:mm')}"></small>
                    </div>

                    <!-- Mark as read button — unread only -->
                    <form th:if="${!notification.read()}"
                          th:action="@{/notifications/{id}/read(id=${notification.id()})}"
                          method="post"
                          class="flex-shrink-0">
                        <button type="submit" class="btn btn-outline-earth btn-sm" style="font-size:0.75rem;">
                            Mark as read
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
