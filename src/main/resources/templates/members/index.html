<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Family Members - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">

<div class="container py-4 content-medium">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 text-clay fw-semibold">Members</h4>
            <small class="text-earth-muted">Family members without an account</small>
        </div>
        <a th:if="${isParent}" th:href="@{/members/create}" class="btn btn-terracotta btn-sm rounded-pill px-3">
            <i class="fa-solid fa-plus me-1"></i> Add Member
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div th:if="${#lists.isEmpty(members)}" class="text-earth-muted text-center mt-5 small">
        No members added yet. Add young children or others who don't have an account.
    </div>

    <div class="widget-card">
        <div class="widget-body p-0">
            <div th:each="member : ${members}"
                 class="d-flex justify-content-between align-items-center px-3 py-2 entity-row-compact">
                <div>
                    <span class="fw-500 small" th:text="${member.name}"></span>
                    <span th:if="${member.dateOfBirth != null}" class="text-earth-muted ms-2 small"
                          th:text="${'Born: ' + #temporals.format(member.dateOfBirth, 'yyyy, MMM d')}"></span>
                </div>
                <div th:if="${isParent}" class="d-flex gap-2">
                    <a th:href="@{/members/{id}/edit(id=${member.id})}"
                       class="btn btn-outline-earth btn-sm compact-action-btn">Edit</a>
                    <form th:action="@{/members/{id}/delete(id=${member.id})}" method="post"
                          data-confirm="Remove this member?">
                        <button type="submit" class="btn btn-outline-danger btn-sm compact-action-btn">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-modal :: confirm-modal}"></div>
</div><!-- /app-content -->

</body>
</html>
