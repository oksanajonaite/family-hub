spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familyapp_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

app:
  remember-me:
    key: ${REMEMBER_ME_KEY:family-hub-dev-secret-change-in-prod}
    validity-seconds: 2592000  # 30 days
