spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familyapp_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  # Force English locale for all Thymeleaf date formatting (#temporals.format)
  # Without this, JVM default locale (Lithuanian) produces Lithuanian month names
  web:
    locale: en_US
    locale-resolver: fixed

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  devtools:
    restart:
      enabled: false

server:
  servlet:
    session:
      persistent: false

app:
  remember-me:
    key: ${REMEMBER_ME_KEY:family-hub-dev-secret-change-in-prod}
    validity-seconds: 2592000  # 30 days
