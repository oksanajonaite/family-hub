<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="auth-shell auth-shell-minimal">
<div class="auth-minimal-wrap">
    <section class="auth-minimal-brand"
             th:if="${param.error == null and param.logout == null and successMessage == null}">
        <img class="auth-minimal-logo" th:src="@{/img/logo.svg}" alt="Family Hub logo">
        <h1 class="auth-minimal-title">FAMILY HUB</h1>
    </section>

    <section class="auth-form-card auth-form-card-minimal"
             th:classappend="${param.error == null and param.logout == null and successMessage == null} ? '' : ' auth-form-card-no-splash'">
        <div class="auth-form-top auth-form-top-minimal">
            <h2 class="auth-form-title">Log in</h2>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">You have been logged out.</div>
        <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input">
                <label for="remember-me" class="form-check-label small text-earth-muted">Remember me</label>
            </div>
            <button type="submit" class="btn btn-terracotta w-100">Log in</button>
        </form>

        <div class="auth-minimal-links">
            <p class="text-center mb-1 small">No account? <a th:href="@{/register}" class="auth-link">Register</a></p>
            <p class="text-center mb-0"><a th:href="@{/forgot-password}" class="text-earth-muted small text-decoration-none">Forgot password?</a></p>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
