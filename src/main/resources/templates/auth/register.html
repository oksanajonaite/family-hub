<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/minty/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 450px;">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Create account</h4>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <div class="mb-3">
                    <label for="displayName" class="form-label">Display name</label>
                    <input type="text" id="displayName" th:field="*{displayName}"
                           class="form-control" th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{displayName}"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>
                <div class="mb-3">
                    <label for="dateOfBirth" class="form-label">
                        Date of birth <span class="text-muted">(optional)</span>
                    </label>
                    <!-- min="1926-01-01" ir max — šiandiena (negali būti ateityje) -->
                    <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}"
                           class="form-control" th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'"
                           min="1926-01-01" th:max="${today}">
                    <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
                </div>
                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Already have an account? <a th:href="@{/login}">Log in</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
