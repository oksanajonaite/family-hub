<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body style="background-color: var(--bg-body); min-height: 100vh;" class="d-flex align-items-center justify-content-center">

<div style="width: 100%; max-width: 420px; padding: 1rem;">

    <div class="widget-card">
        <div class="widget-header deep-clay text-center" style="font-size: 1.05rem; padding: 14px 16px;">
            <i class="fa-solid fa-house-heart me-2"></i> Family Hub
        </div>
        <div class="widget-body p-4">

            <h6 class="text-clay fw-semibold mb-3">Forgot Password</h6>

            <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

            <form th:action="@{/forgot-password}" th:object="${forgotRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-500 text-clay">Email address</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="your@email.com">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <button type="submit" class="btn btn-terracotta w-100">Send Reset Link</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-earth-muted small text-decoration-none">
                    ← Back to login
                </a>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
