<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" th:href="@{/dashboard}">Family Hub</a>
</nav>

<div class="container mt-4" style="max-width: 640px;">
    <!-- Tas pats form.html naudojamas tiek create, tiek edit.
         Jei eventId yra — tai edit, jei ne — create -->
    <h4 th:text="${eventId != null} ? 'Edit event' : 'New event'">Event</h4>

    <form th:action="${eventId != null} ? @{/events/{id}/edit(id=${eventId})} : @{/events/create}"
          th:object="${eventRequest}"
          method="post"
          class="mt-3">

        <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" th:field="*{title}" class="form-control"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}"></div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col">
                <label class="form-label">Starts at *</label>
                <input type="datetime-local" th:field="*{startsAt}" class="form-control"
                       th:classappend="${#fields.hasErrors('startsAt')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{startsAt}"></div>
            </div>
            <div class="col">
                <label class="form-label">Ends at *</label>
                <input type="datetime-local" th:field="*{endsAt}" class="form-control"
                       th:classappend="${#fields.hasErrors('endsAt')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{endsAt}"></div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Recurrence</label>
            <select th:field="*{recurrenceType}" class="form-select">
                <option th:each="r : ${recurrenceTypes}" th:value="${r}" th:text="${r}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Repeat until</label>
            <input type="date" th:field="*{recurrenceUntil}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Participants (family members)</label>
            <!-- Kelių pasirinkimų sąrašas; Ctrl+Click renkame kelis -->
            <select th:field="*{participantUserIds}" class="form-select" multiple size="4">
                <option th:each="member : ${members}"
                        th:value="${member.id}"
                        th:text="${member.displayName}">
                </option>
            </select>
            <small class="text-muted">Hold Ctrl / Cmd to select multiple</small>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{privateEvent}" class="form-check-input" id="privateEvent">
            <label class="form-check-label" for="privateEvent">Private event (only you can see it)</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/events}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
