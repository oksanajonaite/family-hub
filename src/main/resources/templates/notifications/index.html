<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications - Family Hub</title>
    <th:block th:replace="~{fragments/head-meta :: appMeta}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div class="page-backbar">
            <a th:href="@{/dashboard}" data-back-url="/dashboard" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to dashboard</span>
            </a>
        </div>

        <section class="page-hero">
            <div class="page-hero-copy">
                <span class="page-kicker"><i class="fa-regular fa-bell"></i> Notification center</span>
                <h1 class="page-title">Signals that need your attention</h1>
                <p class="page-subtitle">A cleaner inbox for family reminders and recent changes.</p>
            </div>
            <div class="page-actions">
                <form th:if="${unreadCount > 0}" th:action="@{/notifications/read-all}" method="post">
                    <button type="submit" class="btn btn-outline-earth">Mark all as read</button>
                </form>
            </div>
        </section>

        <section class="page-inline-summary">
            <span><strong th:text="${unreadCount}">0</strong> unread</span>
            <span><strong th:text="${#lists.size(notifications)}">0</strong> total</span>
        </section>

        <div th:if="${#lists.isEmpty(notifications)}" class="surface-card empty-state">
            <i class="fa-regular fa-bell empty-state-icon"></i>
            <p class="empty-state-title">All clear</p>
            <p class="empty-state-subtitle">No notifications yet. You will be notified when tasks are assigned or events are coming up.</p>
        </div>

        <section class="notifications-stack" th:unless="${#lists.isEmpty(notifications)}">
            <article th:each="notification : ${notifications}" class="surface-card notification-card">
                <div class="notification-card-main">
                    <div class="notification-card-head">
                        <div class="notification-card-head-main">
                            <span class="list-card-icon notification-card-icon" th:classappend="${!notification.read()} ? ' olive' : ''">
                                <i th:class="${notification.type.icon}"></i>
                            </span>
                            <div class="notification-card-head-copy">
                                <div class="notification-card-meta-row">
                                    <span class="notification-card-type">
                                        <i class="fa-solid fa-tag"></i>
                                        <span th:text="${notification.type()}"></span>
                                    </span>
                                    <span class="notification-card-time">
                                        <i class="fa-regular fa-clock"></i>
                                        <span th:text="${#temporals.format(notification.createdAt(), 'MMM d, HH:mm')}"></span>
                                    </span>
                                </div>
                                <span class="soft-chip notification-state-chip"
                                      th:classappend="${!notification.read()} ? ' terracotta' : ' neutral'"
                                      th:text="${notification.read()} ? 'Read' : 'Unread'">State</span>
                            </div>
                        </div>
                        <div class="notification-card-actions">
                            <form th:if="${!notification.read()}"
                                  th:action="@{/notifications/{id}/read(id=${notification.id()})}"
                                  method="post">
                                <button type="submit" class="btn btn-outline-earth btn-sm">Mark as read</button>
                            </form>
                        </div>
                    </div>
                    <div class="notification-card-body">
                        <h2 class="notification-card-message" th:text="${notification.message()}">Message</h2>
                    </div>
                </div>
            </article>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
</script>
</body>
</html>
