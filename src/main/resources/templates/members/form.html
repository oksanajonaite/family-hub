<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Family Member – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/minty/bootstrap.min.css">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4" style="max-width: 500px;">
    <h4 th:text="${memberId != null} ? 'Edit Member' : 'Add Family Member'">Member</h4>

    <form th:action="${memberId != null} ? @{/members/{id}/edit(id=${memberId})} : @{/members/create}"
          th:object="${memberRequest}"
          method="post"
          class="mt-3">

        <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="e.g. Tomas">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Date of Birth <span class="text-muted">(optional)</span></label>
            <!-- min="1926-01-01" — seniausias leidžiamas gimimo metai.
                 th:max="${today}" — max dinamiškai: negali pasirinkti ateities datos.
                 today pridedamas GlobalModelAdvice automatiškai. -->
            <input type="date" th:field="*{dateOfBirth}" class="form-control"
                   min="1926-01-01" th:max="${today}">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/members}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
