<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">Family Hub</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">
    <h2>Dashboard</h2>
    <div class="row g-3 mt-2">

        <!-- Šeimos mygtukjai — rodomi tik PARENT ir KID (ne ADMIN) -->
        <!-- sec:authorize="!hasRole('ADMIN')" — rodo visiems IŠSKYRUS ADMIN -->
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <a th:href="@{/family}" class="btn btn-primary">My Family</a>
        </div>
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <a th:href="@{/tasks}" class="btn btn-success">Tasks</a>
        </div>
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <a th:href="@{/events}" class="btn btn-info">Events</a>
        </div>
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <a th:href="@{/pets}" class="btn btn-success">Pets</a>
        </div>
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <a th:href="@{/members}" class="btn btn-secondary">Members</a>
        </div>
        <div class="col-auto" sec:authorize="!hasRole('ADMIN')">
            <!-- Notifications mygtukas su badge -->
            <a th:href="@{/notifications}" class="btn btn-warning position-relative">
                Notifications
                <span th:if="${unreadCount > 0}"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${unreadCount}">
                </span>
            </a>
        </div>

        <!-- Admin panel mygtukas — rodomas TIK ADMIN rolės vartotojui -->
        <div class="col-auto" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}" class="btn btn-danger">Admin Panel</a>
        </div>

    </div>
</div>
</body>
</html>
