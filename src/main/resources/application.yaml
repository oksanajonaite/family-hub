spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familyapp_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  # Force English locale for all Thymeleaf date formatting (#temporals.format)
  # Without this, JVM default locale (Lithuanian) produces Lithuanian month names
  web:
    locale: en_US
    locale-resolver: fixed

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      # Up to 5 receipt photos per upload × 5 MB each = 25 MB max request
      max-request-size: 25MB

  devtools:
    restart:
      enabled: false

server:
  tomcat:
    # Disable Tomcat's own POST size limit — let Spring's max-file-size (5MB) handle it.
    # Without this, Tomcat resets the connection (ERR_CONNECTION_RESET) before Spring
    # gets a chance to throw MaxUploadSizeExceededException and show a friendly message.
    max-http-form-post-size: -1
  servlet:
    session:
      persistent: false

app:
  base-url: http://localhost:8080
  mail:
    from: ${MAIL_FROM:noreply@familyhub.dev}
  remember-me:
    key: ${REMEMBER_ME_KEY:family-hub-dev-secret-change-in-prod}
    validity-seconds: 2592000  # 30 days

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION:eu-north-1}

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta
  # gemini-2.5-flash: latest Flash generation with free tier (20 req/day, 5 req/min)
  # Upgrade to gemini-2.5-pro or enable billing for higher limits in production
  model: gemini-2.5-flash
