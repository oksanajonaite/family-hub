<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Events – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 780px;">

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 text-clay fw-semibold">
            <i class="fa-regular fa-calendar me-1"></i> Events
        </h4>
        <a th:href="@{/events/create}" class="btn btn-terracotta btn-sm rounded-pill px-3">
            <i class="fa-solid fa-plus me-1"></i> New Event
        </a>
    </div>

    <div th:if="${#lists.isEmpty(events)}" class="text-earth-muted text-center mt-5 small">
        No events found.
    </div>

    <div class="d-flex flex-column gap-2">
        <div th:each="event : ${events}" class="widget-card">
            <div class="widget-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <!-- Title and private badge -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="fw-600" th:text="${event.title}"></span>
                            <span th:if="${event.privateEvent}"
                                  class="badge rounded-pill"
                                  style="background:rgba(90,62,46,0.12);color:var(--text-muted);font-size:0.65rem;">private</span>
                        </div>

                        <!-- Date and time -->
                        <div class="text-earth-muted small">
                            <i class="fa-regular fa-clock me-1"></i>
                            <span th:text="${#temporals.format(event.startsAt, 'MMM d, HH:mm')}"></span>
                            <span th:if="${event.endsAt != null}">
                                – <span th:text="${#temporals.format(event.endsAt, 'HH:mm')}"></span>
                            </span>
                        </div>

                        <!-- Recurrence -->
                        <div th:if="${event.recurrenceType != null and event.recurrenceType.name() != 'NONE'}"
                             class="text-earth-muted small mt-1">
                            <i class="fa-solid fa-rotate me-1"></i>
                            Repeats: <span th:text="${event.recurrenceType}"></span>
                            <span th:if="${event.recurrenceUntil != null}">
                                until <span th:text="${event.recurrenceUntil}"></span>
                            </span>
                        </div>

                        <!-- Participants -->
                        <div th:if="${not #lists.isEmpty(event.participantNames)}"
                             class="text-earth-muted small mt-1">
                            <i class="fa-solid fa-user-group me-1"></i>
                            <span th:each="name, i : ${event.participantNames}"
                                  th:text="${name + (i.last ? '' : ', ')}"></span>
                        </div>

                        <!-- Description -->
                        <div th:if="${event.description != null and !event.description.isEmpty()}"
                             class="mt-1 small text-earth-muted" th:text="${event.description}"></div>
                    </div>

                    <!-- Edit and Delete buttons -->
                    <div class="d-flex gap-1 ms-3 flex-shrink-0">
                        <a th:href="@{/events/{id}/edit(id=${event.id})}"
                           class="btn btn-outline-earth btn-sm" style="font-size:0.75rem;">Edit</a>
                        <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post"
                              data-confirm="Delete this event?">
                            <button type="submit" class="btn btn-outline-danger btn-sm" style="font-size:0.75rem;">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-modal :: confirm-modal}"></div>
</body>
</html>
