<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Error – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
<div class="container py-5" style="max-width: 520px;">

    <div class="widget-card">
        <div class="widget-header deep-clay">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> Something went wrong
        </div>
        <div class="widget-body p-4">
            <p class="text-earth-muted mb-3" th:text="${errorMessage}">An unexpected error occurred.</p>
            <a th:href="@{/dashboard}" class="btn btn-terracotta">
                <i class="fa-solid fa-house me-1"></i> Go to Dashboard
            </a>
        </div>
    </div>

</div>
</div><!-- /app-content -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
