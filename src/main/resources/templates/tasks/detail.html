<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Details - Family Hub</title>
    <th:block th:replace="~{fragments/head-meta :: appMeta}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: appShell}"></div>

<div class="app-content" id="appContent">
    <div class="page-shell">
        <div class="page-backbar">
            <a th:href="${backUrl}" th:attr="data-back-url=${backUrl}" class="page-back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span th:text="${backLabel}">Back</span>
            </a>
        </div>

        <section class="page-hero">
            <div class="page-hero-copy">
                <span class="page-kicker"><i class="fa-solid fa-list-check"></i> Task details</span>
                <h1 class="page-title" th:text="${task.title}">Task title</h1>
                <p class="page-subtitle">A clearer detail view for understanding urgency, ownership and progress without jumping into edit mode right away.</p>
            </div>
            <div class="page-actions">
                <a sec:authorize="hasRole('PARENT')"
                   th:href="${fromDashboard} ? @{/tasks/{id}/edit(id=${task.id}, from='dashboard')} : @{/tasks/{id}/edit(id=${task.id})}"
                   class="btn btn-terracotta">
                    <i class="fa-solid fa-pen me-1"></i> Edit
                </a>
            </div>
        </section>

        <div class="surface-card detail-hero-card">
            <div class="detail-header">
                <div class="d-flex flex-column gap-2">
                    <div class="d-flex gap-2 flex-wrap">
                        <span class="priority-chip"
                              th:classappend="${task.priority.name() == 'HIGH'} ? ' high' : (${task.priority.name() == 'MEDIUM'} ? ' medium' : ' low')"
                              th:text="${task.priority}">Priority</span>
                        <span class="status-chip"
                              th:classappend="${task.status.name() == 'TODO'} ? ' todo' : (${task.status.name() == 'IN_PROGRESS'} ? ' progress' : ' done')"
                              th:text="${#strings.capitalizeWords(#strings.toLowerCase(#strings.replace(task.status.name(), '_', ' ')))}">Status</span>
                    </div>
                    <p class="text-earth-muted mb-0"
                       th:text="${task.description != null and !#strings.isEmpty(task.description) ? task.description : 'No description added yet.'}">
                        No description added yet.
                    </p>
                </div>

                <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post">
                    <select name="status" class="form-select form-select-sm status-select-detail" onchange="this.form.submit()">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${task.status == s}"></option>
                    </select>
                </form>
            </div>

            <div class="detail-meta-grid">
                <div class="detail-meta-item">
                    <span class="detail-meta-label">Due date</span>
                    <span class="detail-meta-value"
                          th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'MMM d, yyyy') : 'No due date set'}">No due date set</span>
                </div>
                <div class="detail-meta-item">
                    <span class="detail-meta-label">Assigned to</span>
                    <span class="detail-meta-value"
                          th:if="${not #lists.isEmpty(task.assignedUsers) or not #lists.isEmpty(task.assignedMembers)}">
                        <span th:each="u, i : ${task.assignedUsers}" th:text="${u.displayName + (i.last and #lists.isEmpty(task.assignedMembers) ? '' : ', ')}"></span>
                        <span th:each="m, i : ${task.assignedMembers}" th:text="${m.name + (i.last ? '' : ', ')}"></span>
                    </span>
                    <span class="detail-meta-value"
                          th:if="${#lists.isEmpty(task.assignedUsers) and #lists.isEmpty(task.assignedMembers)}">Nobody assigned yet</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.page-back-link').forEach((link) => {
        link.addEventListener('click', (event) => {
            const backUrl = link.dataset.backUrl;
            if (!backUrl) return;
            event.preventDefault();
            window.location.href = backUrl;
        });
    });
</script>
</body>
</html>
