<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invalid Link – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/minty/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 420px;">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <h4 class="mb-3">Link Expired</h4>
            <p class="text-muted" th:text="${errorMessage}">This reset link is invalid or has expired.</p>
            <a th:href="@{/forgot-password}" class="btn btn-primary">Request New Link</a>
        </div>
    </div>
</div>

</body>
</html>
