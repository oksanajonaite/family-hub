<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet – Family Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" th:href="@{/dashboard}">Family Hub</a>
</nav>

<div class="container mt-4" style="max-width: 500px;">
    <h4 th:text="${petId != null} ? 'Edit Pet' : 'Add Pet'">Pet</h4>

    <form th:action="${petId != null} ? @{/pets/{id}/edit(id=${petId})} : @{/pets/create}"
          th:object="${petRequest}"
          method="post"
          class="mt-3">

        <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Type *</label>
            <select th:field="*{type}" class="form-select">
                <option th:each="t : ${petTypes}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Date of Birth <span class="text-muted">(optional)</span></label>
            <input type="date" th:field="*{dateOfBirth}" class="form-control">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/pets}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
